# docker-compose.yml
version: '3.8'

name: container-security-sandbox

services:
  # ============ INSECURE SCENARIOS ============
  insecure-root:
    build: ./scenarios/insecure/root_container
    container_name: sandbox-root-insecure
    networks:
      - lab-network
      - attack-path

  insecure-privileged:
    build: ./scenarios/insecure/privileged_container
    container_name: sandbox-privileged-insecure
    privileged: true
    networks:
      - lab-network
      - attack-path

  insecure-docker-sock:
    build: ./scenarios/insecure/docker_socket
    container_name: sandbox-sock-insecure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-network
      - attack-path

  insecure-pid-namespace:
    build: ./scenarios/insecure/pid_namespace
    container_name: sandbox-pid-insecure
    pid: host
    networks:
      - lab-network
      - attack-path
    
  insecure-writable:
    build: ./scenarios/insecure/writable_root
    container_name: sanbox-writable-insecure
    pid: host
    networks:
      -lab-network
      -attack-path

  # ============ HARDENED COUNTERPARTS ============
  secure-non-root:
    build:   ./scenarios/secure/non-root_container
    container_name: sandbox-non-root-secure
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - lab-network
      - production-island

  secure-dropped-caps:
    build: ./scenarios/secure/privileged_container
    container_name: sandbox-caps-secure
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - lab-network
      - production-island
      
    secure-no-docker-sock:
      build: ./scenarios/insecure/no_docker_socket
      container_name: sandbox-nosock-secure
      user: "1001:1001"
      read_only: true
      cap_drop:
        - ALL
      cap_add:
        - NET_BIND_SERVICE
      security_opt:
        - no-new-privileges: true
      tmpfs:
        - /tmp:noexec, nosuid, size=100m
      networks:
        - lab-network
        - production-island

      secure-readonly:
        build: ./scenarios/secure/read_only_root
        container_name: sanbox-readonly-secure
        read_only: true
        tmpfs:
          - /tmp:noexec, nosuid,size=100m
        networks:
          - lab-network
          - production-island

  # ============ ATTACKER MACHINE ============
  attacker:
    build:
      context: ./scenarios/attacker
      dockerfile: Dockerfile
    container_name: sandbox-attacker
    networks:
      - lab-network
      - attack-path
    cap_add:
      - NET_ADMIN  # For network scanning
    volumes:
      - ./scenarios/attacker/scripts:/attacks:ro
    stdin_open: true
    tty: true
    depends_on:
      - insecure-root
      - insecure-privileged
      - insecure-docker-sock
      - insecure-pid-namespace
      - insecure-writable

  # ============ MONITORING STACK ============
  auditor:
    build: ./compose/auditor
    container_name: sandbox-auditor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tools:/tools:ro
    networks:
      - management

  networks:
    lab-network:
      driver: bridge
      ipam:
        config:
          - subnet: 172.22.0.0/16

  attack-path:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/16

  managment:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/16


    command: tail -f /dev/null
    labels:
      purpose: "security-auditing"
      description: "Continuous security auditor"

  # ============ NETWORK SERVICES ============
  network-policy:
    image: alpine:latest
    container_name: sandbox-network-policy
    command: >
      sh -c "apk add iptables iptables-openrc && 
             tail -f /dev/null"
    cap_add:
      - NET_ADMIN
    networks:
      - management
    volumes:
      - ./compose/scripts/network-policy.sh:/policy.sh:ro
    labels:
      purpose: "network-enforcement"
      description: "Network policy enforcer"

# ============ NETWORKS ============
networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      purpose: "main-lab-network"
      description: "Primary network for all containers"

  attack-path:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      purpose: "attack-simulation"
      description: "Network where attacks are launched from"
      security: "monitored"

  production-island:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.22.0.0/16
    labels:
      purpose: "secure-production"
      description: "Isolated network for hardened containers"
      security: "restricted"

  management:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/16
    labels:
      purpose: "management"
      description: "Management network for monitoring tools"
