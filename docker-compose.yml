# docker-compose.yml
version: '3.8'

name: container-security-sandbox

services:
  # ============ INSECURE SCENARIOS ============
  insecure-root:
    build:
      context: ./scenarios/insecure/root_container
      dockerfile: Dockerfile
    container_name: sandbox-root-insecure
    networks:
      - lab-network
      - attack-path
    labels:
      security-level: "insecure"
      risk-factors: "root-user"
      description: "Container running as root"

  insecure-privileged:
    build:
      context: ./scenarios/insecure/privileged_container
      dockerfile: Dockerfile
    container_name: sandbox-privileged-insecure
    privileged: true
    networks:
      - lab-network
      - attack-path
    labels:
      security-level: "insecure"
      risk-factors: "privileged-mode"
      description: "Container with --privileged flag"

  insecure-docker-sock:
    build:
      context: ./scenarios/insecure/docker_socket
      dockerfile: Dockerfile
    container_name: sandbox-sock-insecure
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - lab-network
      - attack-path
    labels:
      security-level: "insecure"
      risk-factors: "docker-socket"
      description: "Container with mounted Docker socket"

  insecure-capabilities:
    build:
      context: ./scenarios/insecure/capabilities
      dockerfile: Dockerfile
    container_name: sandbox-capabilities-insecure
    cap_add:
      - SYS_ADMIN
      - NET_ADMIN
      - SYS_PTRACE
    networks:
      - lab-network
      - attack-path
    labels:
      security-level: "insecure"
      risk-factors: "excessive-capabilities"
      description: "Container with excessive Linux capabilities"

  # ============ HARDENED COUNTERPARTS ============
  secure-root:
    build:
      context: ./scenarios/secure/root_container
      dockerfile: Dockerfile
    container_name: sandbox-root-secure
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - lab-network
      - production-island
    labels:
      security-level: "secure"
      compliance: "cis-benchmark"
      description: "Hardened container following best practices"

  secure-privileged:
    build:
      context: ./scenarios/secure/privileged_container
      dockerfile: Dockerfile
    container_name: sandbox-privileged-secure
    user: "1001:1001"
    read_only: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
      - seccomp:./compose/profiles/seccomp.json
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    networks:
      - lab-network
      - production-island
    labels:
      security-level: "secure"
      compliance: "cis-benchmark"
      description: "Minimal privilege container"

  # ============ ATTACKER MACHINE ============
  attacker:
    build:
      context: ./scenarios/attacker
      dockerfile: Dockerfile
    container_name: sandbox-attacker
    networks:
      - lab-network
      - attack-path
    cap_add:
      - NET_ADMIN  # For network scanning
    stdin_open: true
    tty: true
    depends_on:
      - insecure-root
      - insecure-privileged
      - insecure-docker-sock
      - insecure-capabilities
    labels:
      purpose: "penetration-testing"
      description: "Attacker machine for security demonstrations"

  # ============ MONITORING STACK ============
  auditor:
    build:
      context: ./compose/auditor
      dockerfile: Dockerfile
    container_name: sandbox-auditor
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./tools:/tools:ro
    networks:
      - lab-network
      - management
    command: tail -f /dev/null
    labels:
      purpose: "security-auditing"
      description: "Continuous security auditor"

  # ============ NETWORK SERVICES ============
  network-policy:
    image: alpine:latest
    container_name: sandbox-network-policy
    command: >
      sh -c "apk add iptables iptables-openrc && 
             tail -f /dev/null"
    cap_add:
      - NET_ADMIN
    networks:
      - management
    volumes:
      - ./compose/scripts/network-policy.sh:/policy.sh:ro
    labels:
      purpose: "network-enforcement"
      description: "Network policy enforcer"

# ============ NETWORKS ============
networks:
  lab-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    labels:
      purpose: "main-lab-network"
      description: "Primary network for all containers"

  attack-path:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16
    labels:
      purpose: "attack-simulation"
      description: "Network where attacks are launched from"
      security: "monitored"

  production-island:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.22.0.0/16
    labels:
      purpose: "secure-production"
      description: "Isolated network for hardened containers"
      security: "restricted"

  management:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.23.0.0/16
    labels:
      purpose: "management"
      description: "Management network for monitoring tools"
